<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tasbeeh Counter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1 class="title">✨ Tasbeeh Counter ✨</h1>

    <div class="card">

      <img
        id="tasbeehImage"
        src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1000&auto=format&fit=crop"
        alt="Tasbeeh Image"
      >

      <h2 id="zikrText">SubhanAllah</h2>

      <div class="counter-box">
        <span id="count">0</span>
      </div>

      <div class="buttons">
        <button id="countBtn">Count</button>
        <button id="resetBtn">Reset</button>
      </div>

      <div class="target">
        Target: 33 Tasbeeh
      </div>

    </div>

  </div>

  <!-- Click Sound -->
  <audio id="clickSound">
    <source src="https://www.soundjay.com/buttons/sounds/button-16.mp3" type="audio/mpeg">
  </audio>

  <script src="script.js"></script>
</body>
</html>
